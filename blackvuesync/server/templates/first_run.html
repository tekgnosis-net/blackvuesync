{% extends "base.html" %}

{% block title %}Setup -- BlackVue Sync{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <h1 class="auth-heading">Set up BlackVue Sync</h1>
    <p class="auth-subtitle">create an admin account to secure the web interface.</p>

    {% if error %}
    <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth_bp.first_run_post') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          id="username"
          name="username"
          type="text"
          value="{{ username | default('admin') }}"
          autocomplete="username"
          autofocus
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          autocomplete="new-password"
          required
          minlength="12"
        >
        <p class="form-hint">minimum 12 characters</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirm password</label>
        <input
          class="form-input"
          id="confirm"
          name="confirm"
          type="password"
          autocomplete="new-password"
          required
          minlength="12"
        >
      </div>

      <button type="submit" class="button button-primary button-full">Create account</button>
    </form>
  </div>
</div>
{% endblock %}
