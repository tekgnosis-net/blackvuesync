{% extends "base.html" %}

{% block title %}Sign in -- BlackVue Sync{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <h1 class="auth-heading">Sign in</h1>

    {% if error %}
    <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth_bp.login_post') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autofocus
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="button button-primary button-full">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
